name: Update IPTV Playlist

on:
  schedule:
    # Ogni ora (i link MPD scadono ogni ~2 ore)
    - cron: '0 * * * *'
  workflow_dispatch:  # Permette anche il trigger manuale

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run playlist generator
        env:
          AMSTAFF_LIST_URL: ${{ secrets.AMSTAFF_LIST_URL }}
          AMSTAFF_RESOLVE_URL: ${{ secrets.AMSTAFF_RESOLVE_URL }}
          AMSTAFF_USER_AGENT: ${{ secrets.AMSTAFF_USER_AGENT }}
          XOR_SECRET: ${{ secrets.XOR_SECRET }}
        run: |
          python3 update_playlist.py ./output

      - name: Check for changes
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain ./output)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "Playlist Bot"
          git config user.email "bot@playlist.local"
          git add ./output
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          git commit -m "Auto-update playlist - ${TIMESTAMP}" || true
          git push
